# This is the YAML file to describe the location modules

packages:
    # modulename must match the value in file name of the descriptor of the module
    - modulename: 'Peppol'
      author: 'CAP-REL'
      author_url: 'https://cap-rel.fr'
      maintener_email: 'contact@cap-rel.fr'
      label:
        fr: 'Peppol (par CAP-REL)'
        en: 'Peppol (by CAP-REL)'
      description:
        fr: "Ajoute à Dolibarr la capacité de générer et recevoir des factures électroniques au format Peppol BIS 3 (UBL) via le réseau Peppol."
        en: "Adds to Dolibarr the ability to generate and receive electronic invoices in Peppol BIS 3 (UBL) format via the Peppol network."
      status: 'enabled'
      created_at: '2024-12-10'
      last_updated_at: 'auto'
      # The git url, stable branch and system to get the sources and guess all auto value
      git: 'https://inligit.fr/cap-rel/dolibarr/plugin-peppol.git'
      git-branch: 'master'
      git-system: 'gitlab'
      cover: 'https://www.dolistore.com/wrapper.php?hashp=7TBpGJTTra9b4051Lv9ltKaD8qQk6J5i'
      current_version: 'auto'
      dolibarrmin: 'auto'
      dolibarrmax: 'auto'
      phpmin: 'auto'
      phpmax: 'auto'
      # direct-download is yes if we can download the module to install it in application
      direct-download: no
      # dolistore-upload is manual if module is also uploaded manually on dolistore.com, auto if sync automatically
      dolistore-upload: 'manual'
      # dolistore-download is url of product page for download if module can also be found on dolistore.com
      dolistore-download: 'https://www.dolistore.com/product.php?id=884'
