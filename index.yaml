
packages:
    # modulename must match the value in file name of the descriptor of the module
    - modulename: 'Facturx'
      author: 'CAP-REL'
      author_url: 'https://cap-rel.fr'
      maintener_email: 'contact@cap-rel.fr'
      label:
        fr: 'Factur-X (par CAP-REL)'
        en: 'Factur-X (by CAP-REL)'
        de: 'ZUGFeRD (by CAP-REL)'
      description:
        fr: 'Ajoute à dolibarr la capacité de générer des factures au format FacturX (Facture électronique) : le fichier PDF est enrichi d’un fichier XML intégré.'
        en: 'Adds to dolibarr the ability to generate invoices in FacturX format (Electronic Invoice): the PDF file is enriched with an integrated XML file.'
        de: 'Fügt dolibarr die Fähigkeit hinzu, Rechnungen im Format XRechnung (Elektronische Rechnung) zu erstellen: Die PDF-Datei wird um eine eingebettete XML-Datei erweitert.'
      status: 'enabled'
      created_at: '2024-12-10'
      last_updated_at: "2026-05-07"
      # The git url, stable branch and system to get the sources and guess all auto value
      git: 'https://inligit.fr/cap-rel/dolibarr/plugin-facturx.git'
      git-branch: 'master'
      git-system: 'gitlab'
      cover: 'https://www.dolistore.com/wrapper.php?hashp=KOkM9ktPixXZY62rjv7J4oKjKV86704r'
      current_version: "1.6.112"
      dolibarrmin: "10.0"
      dolibarrmax: "23.0"
      phpmin: "7.3"
      phpmax: ""
      # direct-download is yes if we can download the module to install it in application
      direct-download: no
      # dolistore-upload is manual if module is also uploaded manually on dolistore.com, auto if sync automatically
      dolistore-upload: 'manual'
      # dolistore-download is url of product page for download if module can also be found on dolistore.com
      dolistore-download: 'https://www.dolistore.com/product.php?id=954'


    - modulename: 'HelloAsso'
      author: 'Dolicloud'
      author_url: 'https://www.dolicloud.com'
      maintener_email: 'contact@dolicloud.com'
      label:
        fr: 'HelloAsso (par DoliCloud)'
        en: 'HelloAsso (by DoliCloud)'
      description:
        fr: 'Offre une solution pour réaliser un paiement en ligne pour toute cotisation d’adhésion à une association, don, facture client ou commande client via l’API HelloAsso. Offre aussi une possibilité de synchroniser les adhérents.'
        en: 'Provides a way to make an online checkout of any membership dues, donation, customer invoice or customer order with the HelloAsso API. Also offer an option to synchronize membership.'
      status: 'enabled'
      created_at: '2024-12-10'
      last_updated_at: "2026-05-19"
      category: '68, 67'
      git: 'https://github.com/Dolibarr/dolibarr-community-modules/tree/main/helloasso'
      git-branch: 'main'
      git-system: 'github'
      cover: 'https://raw.githubusercontent.com/Dolibarr/dolibarr-community-modules/main/helloasso/cover.png'
      current_version: "2.1.0"
      dolibarrmin: "21.0"
      dolibarrmax: "24.0"
      phpmin: "7.1"
      phpmax: "8.4"
      price: 0
      # direct-download is yes if we can download the module to install it in application
      direct-download: yes
      # dolistore-upload is manual if module is also uploaded manually on dolistore.com, auto if sync automatically
      dolistore-upload: 'auto'
      # dolistore-download is url of product page for download if module can also be found on dolistore.com
      dolistore-download: https://www.dolistore.com/product.php?id=2332


    - modulename: 'KSEF'
      author: 'InPoint Automation'
      author_url: 'https://inpointautomation.com'
      maintener_email: 'kontakt@inpointautomation.com'
      label:
        en: 'KSeF Integration (by InPoint Automation)'
        pl: 'Integracja KSeF (przez InPoint Automation)'
      description:
        en: 'Integrates Dolibarr with KSeF (Krajowy System e-Faktur), the Polish National e-Invoice System. Generates FA(3) XML invoices, signs and submits them to KSeF, downloads UPO receipts, and automatically adds QR codes to PDF invoices.'
        pl: 'Integruje Dolibarr z KSeF (Krajowy System e-Faktur), polskim systemem e-faktur. Generuje faktury XML FA(3), podpisuje i przesyła je do KSeF, pobiera potwierdzenia UPO oraz automatycznie dodaje kody QR do faktur PDF.'
      status: 'enabled'
      created_at: '2025-12-04'
      last_updated_at: "2026-05-07"
      category: '74'
      git: 'https://github.com/InPoint-Automation/Dolibarr-KSeF-Module.git'
      git-branch: 'main'
      git-system: 'github'
      cover: 'https://raw.githubusercontent.com/InPoint-Automation/Dolibarr-KSeF-Module/refs/heads/main/img/ksef.png'
      current_version: "1.3.7"
      dolibarrmin: "14.0"
      dolibarrmax: "23.0"
      phpmin: '7.4'
      phpmax: ""
      price: 0
      direct-download: yes
      dolistore-upload: 'no'
      dolistore-download: ''


    - modulename: 'PDPConnectFR'
      author: 'Dolibarr foundation'
      author_url: 'https://www.dolibarr.org'
      maintener_email: 'mdaoud@dolicloud.com'
      label:
        fr: 'PDP Connect (France)'
        en: 'PDP Connect (France)'
      description:
        fr: "Offre une solution de facturation électronique pour connecter votre Dolibarr à une Plateforme de Dématérialisation Partenaire (aussi appelé Plateforme Agréée) afin de générer, d''envoyer et de recevoir les factures au format Electronique (e-invoice au format FacturX ou CII)."
        en: "Offers an e-invoice solution to connect your Dolibarr to a Partner Dematerialized Platform (also called Approved Platform) in order to send and receive invoices in electronic format. Includes reading and generation of invoices in FacturX format."
      status: 'soon'
      git: 'https://github.com/Dolibarr/dolibarr-community-modules/tree/main/pdpconnectfr'
      git-branch: 'main'
      git-system: 'github'
      cover: 'https://raw.githubusercontent.com/Dolibarr/dolibarr-community-modules/refs/heads/main/pdpconnectfr/img/object_pdpconnectfr.png'
      current_version: '0.0.1'
      dolibarrmin: "22.0"
      dolibarrmax: "23.0"
      phpmin: "7.2"
      phpmax: ""
      price: 0
      created_at: '2025-10-10'
      last_updated_at: "2026-05-19"
      # direct-download is yes if we can download the module to install it in application
      direct-download: no
      # dolistore-upload is manual if module is also uploaded manually on dolistore.com, auto if sync automatically
      dolistore-upload: 'manual'
      # dolistore-download is url of product page for download if module can also be found on dolistore.com
      # Example: https://www.dolistore.com/product.php?id=xxx
      dolistore-download: ''


